<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Onchain Posting App - Simple</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white flex items-center justify-center min-h-screen">  <div class="w-full max-w-md p-6 bg-gray-800 rounded-2xl shadow-xl">
    <h1 class="text-2xl font-bold mb-4 text-center">🚀 Onchain Post</h1><button onclick="connectWallet()" class="w-full bg-blue-500 p-2 rounded-xl mb-4">Connect Wallet</button>

<textarea id="postInput" placeholder="Write something..." class="w-full p-2 rounded-xl text-black mb-3"></textarea>

<button onclick="addPost()" class="w-full bg-green-500 p-2 rounded-xl">Post</button>

<div id="feed" class="mt-4 space-y-2"></div>

  </div>  <script>
    let account = null;

    async function connectWallet() {
      if (window.ethereum) {
        const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
        account = accounts[0];
        alert("Connected: " + account);
      } else {
        alert("Install MetaMask!");
      }
    }

    function addPost() {
      const input = document.getElementById("postInput");
      const feed = document.getElementById("feed");

      if (!input.value) return;

      const post = document.createElement("div");
      post.className = "bg-gray-700 p-3 rounded-xl";
      post.innerHTML = `
        <p>${input.value}</p>
        <small class="text-gray-400">${account ? account : "Anonymous"}</small>
      `;

      feed.prepend(post);
      input.value = "";
    }
  </script></body>
</html>
